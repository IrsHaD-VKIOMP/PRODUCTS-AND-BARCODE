<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suggest Product - Products And Barcode</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene-3d" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-floor"></div>
  </div>

  <header class="site-header">
    <div class="brand-bar">
      <div class="brand">Products <span>&</span> Barcode</div>
      <div class="top-actions">
        <a href="contact.html" class="btn-secondary">Contact</a>
        <a href="login.html" class="btn-primary">Admin Login</a>
      </div>
    </div>

    <div class="nav-wrap">
      <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
        <a href="about.html">About</a>
        <a href="admin.html" class="active">Admin / Suggest</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="section-card">
      <h1>Suggest A Product</h1>
      <p class="lead">
        Submit a product for review with category, barcode, image, and buying link. Approved items can be added to the live catalog.
      </p>

      <form id="suggestForm">
        <div class="form-grid">
          <div class="field">
            <label for="name">Product Name</label>
            <input type="text" id="name" placeholder="Enter product name" required />
          </div>

          <div class="field">
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="Electronics / Supermarket / Fresh Food" required />
          </div>

          <div class="field">
            <label for="barcode">Barcode</label>
            <input type="text" id="barcode" placeholder="Enter barcode" required />
          </div>

          <div class="field">
            <label for="image">Image URL</label>
            <input type="url" id="image" placeholder="https://example.com/image.jpg" required />
          </div>

          <div class="field full">
            <label for="link">Buying Link</label>
            <input type="url" id="link" placeholder="https://example.com/product" required />
          </div>

          <div class="field full">
            <label for="message">Optional Message</label>
            <input type="text" id="message" placeholder="Optional note about this product" />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" id="suggestBtn">Send Suggestion</button>
          <a href="admin.html" class="btn-secondary">Back</a>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-box">&copy; 2026 ProductsAndBarcode. All rights reserved.</div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDz9DxN0mLSpn_6A-opMeIEAEG4cIDk8OQ",
      authDomain: "productsandbarcode.firebaseapp.com",
      projectId: "productsandbarcode",
      storageBucket: "productsandbarcode.firebasestorage.app",
      messagingSenderId: "809301561294",
      appId: "1:809301561294:web:d61d4820d9961f84cba59f",
      measurementId: "G-MG7V865BE6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById("suggestForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const btn = document.getElementById("suggestBtn");
      const name = document.getElementById("name").value.trim();
      const category = document.getElementById("category").value.trim();
      const barcode = document.getElementById("barcode").value.trim();
      const image = document.getElementById("image").value.trim();
      const link = document.getElementById("link").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!name || !category || !barcode || !image || !link) {
        alert("Please fill in all required fields");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending...";

      try {
        await db.collection("product_suggestions").add({
          name: name,
          category: category,
          barcode: barcode,
          image: image,
          link: link,
          message: message,
          status: "pending",
          createdAt: new Date().toISOString()
        });

        alert("Suggestion sent successfully");
        document.getElementById("suggestForm").reset();
      } catch (error) {
        console.error(error);
        alert("Failed to send suggestion");
      } finally {
        btn.disabled = false;
        btn.textContent = "Send Suggestion";
      }
    });
  </script>
</body>
</html>
